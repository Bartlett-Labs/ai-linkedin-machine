version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - API_PORT=8000
    volumes:
      - ./credentials:/app/credentials:ro
      - ./config:/app/config
      - ./tracking:/app/tracking
      - ./queue:/app/queue
      - ./logs:/app/logs

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
