# Core application settings for the AI LinkedIn Machine.

timezone: US/Central

# Browser settings
headless: true
session_dir: ~/.ai-linkedin-machine/sessions

# Google Sheet (the intelligence layer)
# The actual Sheet ID should be set via GOOGLE_SHEET_ID env var
google_sheet_id: ${GOOGLE_SHEET_ID}

# LLM settings
# Primary: Claude Opus 4.6 via Bedrock proxy or direct API (see llm/provider.py)
# Fallback: OpenAI GPT-5.2 (only used if Anthropic/Bedrock is unavailable)
# Model IDs are managed in llm/provider.py and can be overridden via env vars:
#   CLAUDE_MODEL (Bedrock default: global.anthropic.claude-opus-4-6-v1:0)
#   OPENAI_MODEL (default: gpt-5.2)
llm_primary: claude-opus-4-6
llm_fallback: gpt-5.2
llm_temperature: 0.7
llm_max_tokens: 500

# LinkedIn API (for API-based posting where supported)
linkedin_client_id: ${LINKEDIN_CLIENT_ID}
linkedin_client_secret: ${LINKEDIN_CLIENT_SECRET}

# Content settings
max_post_length: 3000
max_comment_length: 1250

# Logging
log_level: INFO
log_file: logs/ai-linkedin-machine.log

# Paths
queue_dir: queue/
tracking_dir: tracking/linkedin/
credentials_dir: credentials/
